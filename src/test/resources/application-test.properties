# ===========================
# Test Profile
# ===========================

spring.application.name=oms-test

# ===========================
# Test Database
# ===========================

spring.datasource.url=jdbc:h2:mem:oms_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ===========================
# ProblemDetail / Messages
# ===========================

spring.mvc.problemdetails.enabled=true

spring.messages.encoding=UTF-8
spring.messages.use-code-as-default-message=true
spring.messages.basename=\
  exception_messages/reservations_ex_messages,\
  exception_messages/orders_ex_messages,\
  exception_messages/tables_ex_messages,\
  exception_messages/visits_ex_messages,\
  exception_messages/common_ex_messages

# ===========================
# Spring Modulith Events
# ===========================

spring.modulith.events.jdbc.schema-initialization.enabled=false
spring.modulith.events.republish-outstanding-events-on-restart=false