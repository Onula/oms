services:
  postgres:
    image: postgres:17
    container_name: oms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: oms
      POSTGRES_USER: oms
      POSTGRES_PASSWORD: oms123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oms -d oms"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: